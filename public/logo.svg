    <circle cx="65" cy="55" r="15" />
    <!-- Toe 2 -->
    <circle cx="90" cy="35" r="16" />
    <!-- Toe 3 -->
    <circle cx="120" cy="35" r="16" />
    <!-- Toe 4 -->
    <circle cx="145" cy="55" r="15" />
    
    <!-- Medical Cross inside Main pad -->
    <path d="M 94 90 h -12 v 12 h 12 v 12 h 12 v -12 h 12 v -12 h -12 v -12 h -12 z" fill="#10B981" />
