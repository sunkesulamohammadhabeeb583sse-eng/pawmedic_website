  </defs>
  
  <rect width="200" height="200" rx="40" fill="url(#grad)" />
  
  <g fill="white" filter="url(#shadow)">
    <!-- Main pad -->
    <path d="M 100 135 C 130 135 145 110 145 90 C 145 80 130 65 100 65 C 70 65 55 80 55 90 C 55 110 70 135 100 135 Z" />
