      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#0F766E" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.2"/>
